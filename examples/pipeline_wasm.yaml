name: wasm-demo
nodes:
  - name: wasm_inc
    engine: wasm
    code: |
      (module
        (func $run (export "run") (param i32) (result i32)
          local.get 0
          i32.const 1
          i32.add)
      )
    inputs:
      - value

  - name: native_echo
    engine: native
    code: |
      echo
    inputs:
      - wasm_inc

  - name: uiua_inspect
    engine: uiua
    code: |
      ; simple uiua snippet that returns its input wrapped
      [identity]
    inputs:
      - wasm_inc

  - name: wasm_prefix
    engine: wasm
    code: |
      (module
        (memory (export "memory") 1)
        (global $heap (mut i32) (i32.const 1024))
        (func $alloc (export "alloc") (param $n i32) (result i32)
          global.get $heap
          global.get $heap
          local.get $n
          i32.add
          global.set $heap)
        (data (i32.const 0) "[WASM_PROCESSED]: ")
        (func $run (export "run") (param $ptr i32) (param $len i32) (result i32 i32)
          (local $out i32)
          (local $i i32)
          (local $prefix_len i32)
          (local.set $prefix_len (i32.const 18))
          (local.set $out (call $alloc (i32.add (local.get $prefix_len) (local.get $len))))

          ;; copy prefix from memory offset 0
          (local.set $i (i32.const 0))
          (block
            (loop
              (br_if 1 (i32.ge_s (local.get $i) (local.get $prefix_len)))
              (i32.store8
                (i32.add (local.get $out) (local.get $i))
                (i32.load8_u (i32.add (i32.const 0) (local.get $i)))
              )
              (local.set $i (i32.add (local.get $i) (i32.const 1)))
              (br 0)
            )
          )

          ;; copy input bytes after prefix
          (local.set $i (i32.const 0))
          (block
            (loop
              (br_if 1 (i32.ge_s (local.get $i) (local.get $len)))
              (i32.store8
                (i32.add (local.get $out) (i32.add (local.get $prefix_len) (local.get $i)))
                (i32.load8_u (i32.add (local.get $ptr) (local.get $i)))
              )
              (local.set $i (i32.add (local.get $i) (i32.const 1)))
              (br 0)
            )
          )

          (local.get $out)
          (i32.add (local.get $prefix_len) (local.get $len))
        )
      )
    inputs:
      - value
